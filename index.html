<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Professional Test Ilova</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <button id="themeToggleBtn" class="btn btn-icon theme-toggle" title="Mavzuni o'zgartirish">🌙</button>
    <!-- Confetti Canvas for celebrations -->
    <canvas id="confettiCanvas"></canvas>
    <div class="container">
        <header class="header">
            <h1 id="logo">🎓 EduTest</h1>
            <div class="auth-section hidden">
                <span id="userInfo" class="user-info hidden"></span>
                <button id="loginBtn" class="btn btn-secondary">Google orqali kirish</button>
                <button id="logoutBtn" class="btn btn-secondary hidden">Chiqish</button>
            </div>
        </header>

        <!-- Home Screen (Subjects) -->
        <main id="homeScreen" class="screen">
            <h2 style="color: white; margin-bottom: 24px;">Fanlarni tanlang</h2>
            <div class="home-controls">
                <button id="vibrationToggleBtn" class="btn vibration-toggle vibration-on">📳 Tebranish: <strong>Yoqilgan</strong></button>
                <button id="autoScrollToggleBtn" class="btn autoscroll-toggle autoscroll-on">⬇️ Avtomatik o'tish: <strong>Yoqilgan</strong></button>
            </div>
            <div id="subjectsGrid" class="grid">
                <!-- Subject cards will be injected here -->
            </div>
        </main>

        <!-- Variants Screen -->
        <main id="variantsScreen" class="screen hidden">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px;">
                <h2 id="subjectTitle" style="color: white;"></h2>
                <button id="backToHomeBtn" class="btn btn-secondary">Orqaga</button>
            </div>
            <div id="variantsGrid" class="grid">
                <!-- Variant cards will be injected here -->
            </div>
        </main>

        <!-- Quiz Screen -->
        <main id="quizScreen" class="screen hidden">
            <div class="quiz-header">
                <button id="exitQuizBtn" class="exit-btn">← Chiqish</button>
                <div id="timer" class="timer-banner">25:00</div>
            </div>
            <div id="questionList" class="question-list">
                <!-- Questions will be injected here -->
            </div>
            <div class="quiz-footer">
                <button id="finishQuizBtn" class="btn btn-primary" style="font-size: 18px; padding: 16px 48px;">Testni yakunlash</button>
            </div>
        </main>

        <!-- Results Screen -->
        <main id="resultsScreen" class="screen hidden">
            <div class="results">
                <h2>🎉 Natijalar</h2>
                <div class="stats">
                    <div class="stat-item correct">
                        <div class="stat-value" id="correctCount">0</div>
                        <div class="stat-label">To'g'ri javoblar</div>
                    </div>
                    <div class="stat-item incorrect">
                        <div class="stat-value" id="incorrectCount">0</div>
                        <div class="stat-label">Noto'g'ri javoblar</div>
                    </div>
                </div>
                
                <p id="bestScoreInfo" class="best-score-info hidden"></p>
                
                <div class="result-buttons">
                    <button id="retakeBtn" class="btn btn-secondary">🔄 Qayta topshirish</button>
                    <button id="reviewBtn" class="btn btn-secondary">📋 Xatolarni ko'rish</button>
                    <button id="homeBtn" class="btn btn-primary">🏠 Bosh sahifa</button>
                </div>

                <div id="reviewSection" class="review-list hidden">
                    <h3>Batafsil tahlil</h3>
                    <div id="reviewQuestions" class="question-list">
                        <!-- Review questions will be injected here -->
                    </div>
                    <div class="review-back-actions">
                        <button id="reviewBackHomeBtn" class="btn btn-primary">🏠 Bosh sahifa</button>
                        <button id="reviewRetakeBtn" class="btn btn-secondary">🔄 Qayta topshirish</button>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Application Logic -->
    <script type="module" src="/main.js"></script>
</body>
</html>
